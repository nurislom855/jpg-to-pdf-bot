name: Telegram Bot

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '*/6 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kutubxonalarni o'rnatish
        run: pip install python-telegram-bot Pillow img2pdf

      - name: Botni ishga tushirish
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: timeout 300 python bot.py || true
