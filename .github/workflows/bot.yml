name: Telegram Bot

on:
  schedule:
    - cron: '0 */5 * * *'   # har 5 soatda qayta yoqiladi
  workflow_dispatch:          # qo'lda ishga tushirish uchun
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290      # 4h 50min — 5 soatlik limitdan oldin to'xtaydi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (LibreOffice + Playwright)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libreoffice libreoffice-calc libreoffice-writer \
            libreoffice-impress poppler-utils fonts-liberation fonts-dejavu

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pypdf
          playwright install chromium
          playwright install-deps chromium

      - name: Run Bot
        env:
          BOT_TOKEN:   ${{ secrets.BOT_TOKEN }}
          REDIS_URL:   ${{ secrets.REDIS_URL }}
          REDIS_TOKEN: ${{ secrets.REDIS_TOKEN }}
        run: |
          timeout 17400 python bot.py || true
          # 17400 sec = 4h 50min
