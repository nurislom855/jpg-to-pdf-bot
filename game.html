<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake O'yini</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--tg-theme-bg-color,#0f172a);
  color:var(--tg-theme-text-color,#f1f5f9);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:12px;user-select:none;overflow:hidden;
}
h1{font-size:20px;font-weight:700;margin-bottom:2px;}
.sub{font-size:13px;opacity:.5;margin-bottom:10px;}
.score-row{display:flex;gap:10px;margin-bottom:10px;width:100%;max-width:360px;}
.sc{flex:1;background:rgba(255,255,255,.07);border-radius:12px;padding:8px;text-align:center;}
.sc .v{font-size:20px;font-weight:700;}
.sc .l{font-size:11px;opacity:.5;margin-top:2px;}
#canvas{border-radius:14px;display:block;touch-action:none;}
.canvas-wrap{position:relative;}
.overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border-radius:14px;
  background:rgba(0,0,0,.8);gap:8px;
}
.ov-icon{font-size:46px;}
.ov-title{font-size:22px;font-weight:700;color:#fff;}
.ov-sub{font-size:14px;color:rgba(255,255,255,.6);}
.ov-rec{font-size:13px;color:#fbbf24;}
.ov-btn{
  margin-top:10px;padding:11px 36px;
  background:var(--tg-theme-button-color,#6366f1);
  color:#fff;border:none;border-radius:14px;
  font-size:16px;font-weight:600;cursor:pointer;
}
.controls{
  display:grid;
  grid-template-columns:56px 56px 56px;
  grid-template-rows:56px 56px;
  gap:8px;margin-top:12px;
}
.ctrl-btn{
  background:rgba(255,255,255,.1);border:none;border-radius:12px;
  color:#fff;font-size:24px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:background .1s;
}
.ctrl-btn:active{background:rgba(255,255,255,.3);}
#btn-up{grid-column:2;grid-row:1;}
#btn-left{grid-column:1;grid-row:2;}
#btn-down{grid-column:2;grid-row:2;}
#btn-right{grid-column:3;grid-row:2;}
.diff-row{display:flex;gap:8px;margin-top:10px;}
.d-btn{
  padding:7px 16px;border-radius:99px;
  border:1.5px solid rgba(255,255,255,.2);
  background:transparent;color:#fff;font-size:13px;cursor:pointer;
}
.d-btn.active{
  background:var(--tg-theme-button-color,#6366f1);
  border-color:var(--tg-theme-button-color,#6366f1);
}
</style>
</head>
<body>
<h1>🐍 Snake</h1>
<p class="sub">Ilonni boshqar, ovqat ye, o'sib bor!</p>

<div class="score-row">
  <div class="sc"><div class="v" id="s-score">0</div><div class="l">Ball</div></div>
  <div class="sc"><div class="v" id="s-best">0</div><div class="l">Rekord</div></div>
  <div class="sc"><div class="v" id="s-len">3</div><div class="l">Uzunlik</div></div>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div class="overlay" id="overlay">
    <div class="ov-icon">🐍</div>
    <div class="ov-title">Snake O'yini</div>
    <div class="ov-sub">Ilonni boshqarib ovqat ye!</div>
    <button class="ov-btn" onclick="startGame()">Boshlash ▶</button>
  </div>
</div>

<div class="diff-row">
  <button class="d-btn" onclick="setSpeed(200,this)">🐢 Sekin</button>
  <button class="d-btn active" onclick="setSpeed(130,this)">🐍 O'rta</button>
  <button class="d-btn" onclick="setSpeed(70,this)">⚡ Tez</button>
</div>

<div class="controls">
  <button class="ctrl-btn" id="btn-up"    onclick="sd(0,-1)">▲</button>
  <button class="ctrl-btn" id="btn-left"  onclick="sd(-1,0)">◀</button>
  <button class="ctrl-btn" id="btn-down"  onclick="sd(0,1)">▼</button>
  <button class="ctrl-btn" id="btn-right" onclick="sd(1,0)">▶</button>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const ov=document.getElementById('overlay');

const CELL=18, COLS=20, ROWS=20;
const W=COLS*CELL, H=ROWS*CELL;
canvas.width=W; canvas.height=H;

let snake,dir,ndir,food,score,best=0,iv=null,speed=130,alive=false;

function setSpeed(s,el){
  speed=s;
  document.querySelectorAll('.d-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(alive){clearInterval(iv);iv=setInterval(step,speed);}
}

function rndFood(){
  let p;
  do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===p.x&&s.y===p.y));
  return p;
}

function startGame(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};ndir={x:1,y:0};
  food=rndFood();score=0;alive=true;
  ov.style.display='none';
  upd();clearInterval(iv);
  iv=setInterval(step,speed);
}

function sd(dx,dy){
  if(dx===1&&dir.x===-1)return;
  if(dx===-1&&dir.x===1)return;
  if(dy===1&&dir.y===-1)return;
  if(dy===-1&&dir.y===1)return;
  ndir={x:dx,y:dy};
}

function step(){
  dir={...ndir};
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)){
    gameOver();return;
  }
  snake.unshift(h);
  if(h.x===food.x&&h.y===food.y){
    score+=10;if(score>best)best=score;
    food=rndFood();
    if(tg)tg.HapticFeedback?.impactOccurred('light');
  }else{snake.pop();}
  upd();
}

function upd(){
  document.getElementById('s-score').textContent=score;
  document.getElementById('s-best').textContent=best;
  document.getElementById('s-len').textContent=snake.length;
  draw();
}

function draw(){
  // Background
  ctx.fillStyle='#0f172a';
  ctx.fillRect(0,0,W,H);

  // Grid dots
  ctx.fillStyle='rgba(255,255,255,0.05)';
  for(let i=0;i<COLS;i++)for(let j=0;j<ROWS;j++){
    ctx.beginPath();ctx.arc(i*CELL+CELL/2,j*CELL+CELL/2,1,0,Math.PI*2);ctx.fill();
  }

  // Food glow
  const p=0.5+0.5*Math.sin(Date.now()/180);
  ctx.save();
  ctx.shadowColor='#f472b6';ctx.shadowBlur=12+6*p;
  ctx.fillStyle='#f472b6';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Food inner
  ctx.fillStyle='#fda4d0';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-5,0,Math.PI*2);
  ctx.fill();

  // Snake body
  snake.forEach((seg,i)=>{
    const t=i/snake.length;
    if(i===0)ctx.fillStyle='#a5b4fc';
    else if(t<0.3)ctx.fillStyle='#818cf8';
    else if(t<0.6)ctx.fillStyle='#6366f1';
    else ctx.fillStyle='#4f46e5';

    const pad=i===0?1:2;
    const r=i===0?6:4;
    const x=seg.x*CELL+pad,y=seg.y*CELL+pad;
    const sz=CELL-pad*2;
    ctx.beginPath();
    ctx.roundRect(x,y,sz,sz,r);
    ctx.fill();
  });

  // Eyes on head
  if(snake.length>0){
    const h=snake[0];
    ctx.fillStyle='#fff';
    const cx=h.x*CELL+CELL/2,cy=h.y*CELL+CELL/2;
    const ex=dir.x,ey=dir.y;
    const fw=4,side=4;
    ctx.beginPath();ctx.arc(cx+ex*fw+ey*side,cy+ey*fw+ex*side,2.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+ex*fw-ey*side,cy+ey*fw-ex*side,2.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1e1b4b';
    ctx.beginPath();ctx.arc(cx+ex*fw+ey*side,cy+ey*fw+ex*side,1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+ex*fw-ey*side,cy+ey*fw-ex*side,1,0,Math.PI*2);ctx.fill();
  }
}

function gameOver(){
  alive=false;clearInterval(iv);
  if(tg)tg.HapticFeedback?.notificationOccurred('error');
  const medal=score>=100?'🥇':score>=50?'🥈':score>=20?'🥉':'💀';
  const isRec=score>=best&&score>0;
  ov.innerHTML=`
    <div class="ov-icon">${medal}</div>
    <div class="ov-title">O'yin tugadi!</div>
    <div class="ov-sub">Ball: <b>${score}</b> &nbsp;|&nbsp; Uzunlik: <b>${snake.length}</b></div>
    ${isRec?'<div class="ov-rec">🏆 Yangi rekord!</div>':''}
    <button class="ov-btn" onclick="startGame()">Qayta o'ynash 🔄</button>
  `;
  ov.style.display='flex';
}

// Touch swipe
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy))sd(dx>0?1:-1,0);
  else sd(0,dy>0?1:-1);
},{passive:true});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp')sd(0,-1);
  if(e.key==='ArrowDown')sd(0,1);
  if(e.key==='ArrowLeft')sd(-1,0);
  if(e.key==='ArrowRight')sd(1,0);
});

// Animate food pulse
function loop(){draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
